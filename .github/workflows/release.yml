# Build the PhoneCMD desktop host for every platform and publish the installers
# to a GitHub Release. Free: GitHub hosts the runners AND the download bandwidth
# for public repos, so distribution costs nothing.
#
# Trigger by pushing a tag:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Note on signing: the installers are UNSIGNED (a Windows cert is ~$300/yr, an
# Apple account $99/yr). Windows shows "Windows protected your PC" — users click
# More info → Run anyway. macOS Gatekeeper blocks it harder: right-click → Open.
# The download page explains both.
#
# Note on filenames (why auto-update broke through v0.1.9): electron-builder's
# default NSIS name is "PhoneCMD Setup <v>.exe" (spaces). electron-updater writes
# it into latest.yml URL-encoded with hyphens ("PhoneCMD-Setup-<v>.exe"), but the
# GitHub release upload rewrites spaces to dots ("PhoneCMD.Setup.<v>.exe"). The
# two names then disagree and the updater's download 404s — silently. Fixed by
# win.artifactName = "${productName}-Setup-${version}.${ext}" in package.json,
# which is space-free so all three names match. Don't reintroduce spaces here.

name: Release desktop app

on:
  push:
    tags: ['v*']
  workflow_dispatch: # lets you build from the Actions tab without tagging

permissions:
  contents: write # needed to create the Release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false # one platform failing shouldn't sink the others
      matrix:
        # Each platform ships its installer AND its electron-updater manifest
        # (latest.yml / latest-mac.yml / latest-linux.yml + the .blockmap for
        # differential downloads). The manifest is what an installed app fetches
        # to notice a newer release — without it, auto-update can't work.
        include:
          - os: windows-latest
            artifact: |
              release/*.exe
              release/*.exe.blockmap
              release/latest.yml
          - os: macos-latest
            artifact: |
              release/*.dmg
              release/*.dmg.blockmap
              release/latest-mac.yml
          - os: ubuntu-latest
            artifact: |
              release/*.AppImage
              release/latest-linux.yml

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # node-pty is a native module. Its shipped prebuilds target Node's ABI, but
      # Electron has a different one, so @electron/rebuild MUST recompile it from
      # source — which needs a C++ toolchain. The GitHub runners have one
      # (Windows: VS 2022; macOS: Xcode CLT; Linux: gcc), which is exactly why we
      # build here rather than on a dev laptop.
      #
      # This matters: if node-pty fails to load, the app silently falls back to
      # piped shells and LOSES persistent interactive sessions — the core feature.
      # The verify step below fails the build rather than shipping that.
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      # node-pty is recompiled for Electron's ABI (its prebuilds aren't N-API, so
      # they don't fit Electron). That compile uses node-gyp, and Python 3.12
      # (the runner default) removed `distutils`, which node-gyp imports → pin 3.11.
      - name: Set up Python 3.11 for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      # Rebuild node-pty for Electron's ABI up front so failures are obvious.
      #
      # Use @electron/rebuild v4 specifically: v3.x bundles its OWN old node-gyp
      # (in @electron/rebuild/node_modules) that only probes VS 2013/2015 and
      # can't see the runner's VS 2022 — "Could not find any Visual Studio". v4
      # bundles node-gyp@12, which detects VS 2022. (Overriding npm_config_node_gyp
      # doesn't help — @electron/rebuild uses its nested copy regardless.)
      - name: Rebuild native modules for Electron
        run: npx --yes @electron/rebuild@^4 -f -w node-pty

      - name: Fetch cloudflared binaries
        # The app spawns its own cloudflared, so it's bundled — users install
        # nothing. Only this runner's platform is needed.
        run: node scripts/fetch-cloudflared.mjs --this-platform-only

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build installer
        # electron-builder is invoked directly: `npm run dist` would re-run
        # fetch:cloudflared for ALL platforms, and macOS/Windows assets aren't
        # available on every runner.
        run: |
          npm run prepack:app
          npx electron-builder --publish never
        env:
          # Don't let electron-builder try to code-sign (we have no certs).
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # node-pty is recompiled for Electron's ABI, so node-gyp must find the
          # runner's Visual Studio. windows-latest ships VS 2022 with the C++
          # workload, but node-gyp doesn't auto-detect it — point it there.
          # (No-op on macOS/Linux.)
          GYP_MSVS_VERSION: '2022'

      - name: Verify the installer was actually produced
        shell: bash
        # electron-builder can exit 0 having built nothing useful. Don't publish
        # an empty release.
        run: |
          shopt -s nullglob
          files=(release/*.exe release/*.dmg release/*.AppImage)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no installer in release/"
            ls -la release/ || true
            exit 1
          fi
          for f in "${files[@]}"; do echo "built: $f ($(du -h "$f" | cut -f1))"; done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phonecmd-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error # fail loudly rather than publish an empty release

  release:
    needs: build
    runs-on: ubuntu-latest
    # Only publish a Release for real tags; workflow_dispatch just builds.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Install

            **Windows** — download the `.exe`. Windows will warn
            "Windows protected your PC" because the installer isn't code-signed
            (a certificate costs ~$300/yr). Click **More info → Run anyway**.

            **macOS** — download the `.dmg`. It isn't notarized, so Gatekeeper
            will block it: **right-click the app → Open → Open**.

            **Linux** — download the `.AppImage`, then
            `chmod +x` it and run it.

            Nothing else to install — `cloudflared` is bundled.
